<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bible Peruser</title>
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="bp-mobile-overlay">
      <div class="bp-mobile-overlay__msg">
        Bible Peruser<br />
        requires 900 pixel width.
      </div>
      <div class="bp-mobile-overlay__actions">
        <button class="bp-mobile-overlay__btn" id="bp-copy-btn">
          Copy Address
        </button>
        <button class="bp-mobile-overlay__btn" id="bp-share-btn">Share</button>
      </div>
      <div class="bp-mobile-overlay__logo">
        <a href="https://gospelgo.org" target="_blank" rel="noopener">
          <img src="images/gospelgo-logo.png" alt="Gospelgo" />
        </a>
      </div>
    </div>
    <div class="bp-app">
      <header class="bp-header">
        <h1 class="bp-header__title">
          Bible Peruser
          <span class="bp-header__by-gospelgo">
            by
            <a
              href="https://gospelgo.org"
              target="_blank"
              rel="noopener"
              class="bp-header__gospelgo-link"
              >Gospelgo</a
            >
          </span>
        </h1>
        <div class="bp-header__nav-center">
          <button id="bp-nav-back" title="Back" aria-label="Back">
            &#8592;
          </button>
          <button id="bp-nav-forward" title="Forward" aria-label="Forward">
            &#8594;
          </button>
        </div>
        <div class="bp-header__info"><small>Best in 4K</small></div>
      </header>
      <div class="bp-layout-container">
        <div class="bp-layout">
          <nav class="bp-sidebar bp-sidebar--left">
            <!-- Navigation will go here -->
          </nav>
          <main class="bp-main">
            <!-- Main Bible content will go here -->
          </main>
          <aside class="bp-sidebar bp-sidebar--right">
            <!-- Notes/context info will go here -->
          </aside>
        </div>
      </div>
      <div class="bp-book-scrollbar-container">
        <div id="bp-book-scrollbar" class="bp-book-scrollbar"></div>
      </div>
      <div class="bp-footer__legend"></div>
      <footer class="bp-footer">
        <span id="bp-char-count">Character count: 0</span>
      </footer>
    </div>
    <script type="module" src="js/bible-loader.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
