<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bible Peruser</title>
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="bp-mobile-overlay">
      <div class="bp-mobile-overlay__msg">
        Bible Peruser<br />
        requires 900 pixel width.
      </div>
      <div class="bp-mobile-overlay__actions">
        <button class="bp-mobile-overlay__btn" id="bp-copy-btn">
          Copy Address
        </button>
        <button class="bp-mobile-overlay__btn" id="bp-share-btn">Share</button>
      </div>
      <div class="bp-mobile-overlay__logo">
        <a href="https://gospelgo.org" target="_blank" rel="noopener">
          <img src="images/gospelgo-logo.png" alt="Gospelgo" />
        </a>
      </div>
    </div>
    <div class="bp-app">
      <header class="bp-header">
        <h1 class="bp-header__title">
          Bible Peruser
          <span class="bp-header__by-gospelgo">
            by
            <a
              href="https://gospelgo.org"
              target="_blank"
              rel="noopener"
              class="bp-header__gospelgo-link"
              >Gospelgo</a
            >
          </span>
        </h1>
        <div class="bp-header__nav-center">
          <div
            class="bp-header__nav-group"
            style="display: flex; align-items: center; gap: 0.5em"
          >
            <button id="bp-nav-back" title="Back" aria-label="Back">
              &#8592;
            </button>
            <span class="bp-header__nav-label">Navigation</span>
            <button id="bp-nav-forward" title="Forward" aria-label="Forward">
              &#8594;
            </button>
          </div>
          <div
            class="bp-header__chapter-group"
            style="
              display: flex;
              align-items: center;
              gap: 0.5em;
              margin-left: 2.5em;
            "
          >
            <button
              id="bp-chapter-prev"
              title="Previous Chapter"
              aria-label="Previous Chapter"
            >
              &#8592;
            </button>
            <span class="bp-header__chapter-label">Chapter</span>
            <button
              id="bp-chapter-next"
              title="Next Chapter"
              aria-label="Next Chapter"
            >
              &#8594;
            </button>
          </div>
        </div>
        <div
          class="bp-header__right"
          style="
            display: flex;
            align-items: center;
            gap: 1.5em;
            position: absolute;
            right: 2.5em;
            top: 50%;
            transform: translateY(-50%);
          "
        >
          <a
            href="https://bereanbible.com/"
            target="_blank"
            rel="noopener"
            class="bp-header__berean-link"
            style="
              color: var(--accent);
              font-weight: bold;
              text-decoration: underline;
            "
            >Berean Standard Bible</a
          >
          <div class="bp-header__info"><small>Best in 4K</small></div>
        </div>
      </header>
      <div class="bp-layout-container">
        <div class="bp-layout">
          <nav class="bp-sidebar bp-sidebar--left">
            <!-- Navigation will go here -->
          </nav>
          <main class="bp-main">
            <!-- Main Bible content will go here -->
          </main>
          <aside class="bp-sidebar bp-sidebar--right">
            <div class="sticky-highlight-toggle-bar">
              <label class="sticky-highlight-toggle-label">
                <input type="checkbox" id="sticky-highlight-toggle" />
                <span>Sticky Highlights</span>
              </label>
            </div>
            <!-- Notes/context info will go here -->
          </aside>
        </div>
      </div>
      <div class="bp-book-scrollbar-container">
        <div id="bp-book-scrollbar" class="bp-book-scrollbar"></div>
      </div>
      <div class="bp-footer__legend"></div>
      <footer class="bp-footer">
        <span id="bp-char-count">Character count: 0</span>
      </footer>
    </div>
    <script type="module" src="js/bible-loader.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
